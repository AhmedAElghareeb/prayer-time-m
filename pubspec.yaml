name: prayer_times
description: "Prayer Times Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Location
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  # HTTP
  http: ^1.6.0

  # Local notifications
  flutter_local_notifications: ^20.1.0

  # Timezone (required for exact scheduling)
  timezone: ^0.10.0

  # Full Adhan audio playback
  just_audio: ^0.9.38

  # Language
  easy_localization: ^3.0.8
  intl: any


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/translations/